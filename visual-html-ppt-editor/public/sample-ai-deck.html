<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Sample AI HTML Deck</title>
    <style>
      .note {
        padding: 18px 22px;
        border-left: 6px solid #0f766e;
        background: #ecfdf5;
        color: #134e4a;
      }
    </style>
  </head>
  <body>
    <section style="background:#f8fafc;">
      <h1 style="position:absolute;left:84px;top:72px;width:760px;font-size:64px;line-height:1.05;margin:0;color:#111827;">
        AI 生成的 HTML 也能可视化微调
      </h1>
      <p class="note" style="position:absolute;left:88px;top:260px;width:560px;font-size:24px;line-height:1.45;margin:0;">
        这份示例可以导入编辑器，点击元素后拖拽、缩放、改文字和颜色。
      </p>
      <div style="position:absolute;right:96px;top:96px;width:320px;height:420px;border-radius:8px;background:#10232f;color:white;padding:28px;">
        <h2 style="font-size:32px;margin:0 0 22px;">Workflow</h2>
        <p style="font-size:22px;line-height:1.8;margin:0;">HTML<br />Visual Edit<br />Export</p>
      </div>
    </section>
    <section style="background:#fff7ed;">
      <h1 style="position:absolute;left:84px;top:74px;font-size:56px;margin:0;color:#7c2d12;">第二页</h1>
      <p style="position:absolute;left:90px;top:178px;width:740px;font-size:28px;line-height:1.45;color:#9a3412;">
        多页 HTML 会被拆成可切换的 slide，导出时会保留 16:9 页面。
      </p>
    </section>
  </body>
</html>
